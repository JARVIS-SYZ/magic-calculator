<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            min-height: 100vh;
            padding: 24px 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }

        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }

        /* ===== 알림 구독 ===== */
        .section {
            background: #1c1c1e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .notify-btn {
            width: 100%;
            background: #ff9f0a;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .notify-btn:active { opacity: 0.8; }
        .notify-btn:disabled { background: #3a3a3c; color: #888; cursor: not-allowed; }

        .notify-status {
            margin-top: 12px;
            font-size: 13px;
            color: #888;
            text-align: center;
            min-height: 20px;
        }
        .notify-status.ok  { color: #30d158; }
        .notify-status.err { color: #ff453a; }

        /* ===== URL 생성 ===== */
        .url-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .url-input {
            flex: 1;
            background: #2c2c2e;
            border: none;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 13px;
            color: #fff;
            font-family: monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .copy-btn {
            flex-shrink: 0;
            background: #2c2c2e;
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            color: #ff9f0a;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .copy-btn:active { opacity: 0.7; }

        .gen-btn {
            width: 100%;
            background: #2c2c2e;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }
        .gen-btn:active { opacity: 0.7; }

        /* ===== 수신 내역 ===== */
        .log-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .log-item {
            background: #2c2c2e;
            border-radius: 12px;
            padding: 14px 16px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .log-expr {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .log-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
        }

        .log-id {
            background: #3a3a3c;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 11px;
            color: #ff9f0a;
            font-family: monospace;
        }

        .empty-msg {
            text-align: center;
            color: #555;
            font-size: 14px;
            padding: 24px 0;
        }

        .badge {
            display: inline-block;
            background: #ff453a;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            border-radius: 999px;
            padding: 2px 7px;
            margin-left: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<h1>관리자</h1>
<p class="subtitle">계산기 URL 생성 및 입력 내역 확인</p>

<!-- 푸시 알림 구독 -->
<div class="section">
    <div class="section-title">🔔 푸시 알림</div>
    <button class="notify-btn" id="notifyBtn" onclick="subscribeNotification()">
        이 기기에서 알림 받기
    </button>
    <div class="notify-status" id="notifyStatus"></div>
</div>

<!-- URL 생성 -->
<div class="section">
    <div class="section-title">🔗 계산기 URL 생성</div>
    <button class="gen-btn" onclick="generateUrl()">새 URL 생성</button>
    <div class="url-row" id="urlRow" style="display:none">
        <input class="url-input" id="urlOutput" readonly>
        <button class="copy-btn" onclick="copyUrl()">복사</button>
    </div>
</div>

<!-- 수신 내역 -->
<div class="section">
    <div class="section-title">
        📋 수신 내역
        <span class="badge" id="countBadge" style="display:none">0</span>
    </div>
    <div class="log-list" id="logList">
        <div class="empty-msg">아직 수신된 내역이 없어요</div>
    </div>
</div>

<script type="module">
    import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, onSnapshot, orderBy, query, limit }
                                from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { getMessaging, getToken, onMessage }
                                from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js';

    const VAPID_KEY = 'BK9hx4nDAnvp7znOPbcfhxBDK737pAsYyoEkxm7YYtiYKfAsQ1LoXQf1JZOvvxKhSmEMC-9mHbxfFPtZJ38FX7w';

    const firebaseConfig = {
        apiKey: "AIzaSyDEZlkBRFt4JtR1v3QGaBeTOPvD-Zg0cBs",
        authDomain: "magic-calculator-5dcac.firebaseapp.com",
        projectId: "magic-calculator-5dcac",
        storageBucket: "magic-calculator-5dcac.firebasestorage.app",
        messagingSenderId: "760520232651",
        appId: "1:760520232651:web:e22497f76382dc2086954e"
    };

    const app       = initializeApp(firebaseConfig);
    const db        = getFirestore(app);
    const messaging = getMessaging(app);

    // ===== 푸시 알림 구독 =====
    window.subscribeNotification = async function() {
        const btn    = document.getElementById('notifyBtn');
        const status = document.getElementById('notifyStatus');

        try {
            btn.disabled = true;
            status.textContent = '권한 요청 중...';
            status.className = 'notify-status';

            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
                status.textContent = '알림 권한이 거부되었어요.';
                status.className = 'notify-status err';
                btn.disabled = false;
                return;
            }

            // 서비스 워커 등록
            const sw = await navigator.serviceWorker.register('/firebase-messaging-sw.js');

            const token = await getToken(messaging, {
                vapidKey: VAPID_KEY,
                serviceWorkerRegistration: sw
            });

            if (token) {
                // 토큰을 Firestore에 저장
                const { addDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
                await addDoc(collection(db, 'fcm_tokens'), {
                    token: token,
                    createdAt: new Date().toISOString()
                });
                status.textContent = '✅ 알림 등록 완료! 이제 계산 결과를 받을 수 있어요.';
                status.className = 'notify-status ok';
                btn.textContent = '알림 등록됨';
                localStorage.setItem('fcm_token', token);
            }
        } catch (e) {
            console.error(e);
            status.textContent = '오류: ' + e.message;
            status.className = 'notify-status err';
            btn.disabled = false;
        }
    };

    // 이미 등록된 경우 버튼 상태 복원
    if (localStorage.getItem('fcm_token')) {
        document.getElementById('notifyBtn').textContent = '알림 등록됨';
        document.getElementById('notifyStatus').textContent = '✅ 이미 알림이 등록되어 있어요.';
        document.getElementById('notifyStatus').className = 'notify-status ok';
    }

    // 앱 포그라운드 상태에서 메시지 수신
    onMessage(messaging, (payload) => {
        const title = payload.notification?.title || '계산 결과';
        const body  = payload.notification?.body  || '';
        new Notification(title, { body, icon: '/icon-180.png' });
    });

    // ===== URL 생성 =====
    window.generateUrl = function() {
        const id  = Math.random().toString(36).substring(2, 10);
        const url = `${location.origin}/index.html?id=${id}`;
        document.getElementById('urlOutput').value = url;
        document.getElementById('urlRow').style.display = 'flex';
    };

    window.copyUrl = function() {
        const url = document.getElementById('urlOutput').value;
        navigator.clipboard.writeText(url).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = '복사됨!';
            setTimeout(() => btn.textContent = '복사', 1500);
        });
    };

    // ===== 실시간 수신 내역 =====
    let count = 0;
    const q = query(collection(db, 'calculations'), orderBy('timestamp', 'desc'), limit(50));

    onSnapshot(q, (snapshot) => {
        const list = document.getElementById('logList');

        if (snapshot.empty) {
            list.innerHTML = '<div class="empty-msg">아직 수신된 내역이 없어요</div>';
            return;
        }

        count = snapshot.size;
        document.getElementById('countBadge').textContent = count;
        document.getElementById('countBadge').style.display = 'inline-block';

        list.innerHTML = '';
        snapshot.forEach(doc => {
            const d = doc.data();
            const time = d.timestamp?.toDate
                ? d.timestamp.toDate().toLocaleString('ko-KR')
                : '방금';

            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `
                <div class="log-expr">${d.expression}</div>
                <div class="log-meta">
                    <span class="log-id">${d.calcId}</span>
                    <span>${time}</span>
                </div>
            `;
            list.appendChild(item);
        });

        // 새 항목 추가시 브라우저 알림 (포그라운드)
        if (!snapshot.metadata.hasPendingWrites) {
            snapshot.docChanges().forEach(change => {
                if (change.type === 'added') {
                    const d = change.doc.data();
                    if (Notification.permission === 'granted') {
                        new Notification('계산기 입력', {
                            body: d.expression,
                            icon: '/icon-180.png'
                        });
                    }
                }
            });
        }
    });
</script>

</body>
</html>
