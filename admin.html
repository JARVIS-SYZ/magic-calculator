<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>계산기</title>
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
    <link rel="icon" type="image/png" href="icon-180.png">
<style>
* {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
}
html, body {
    background: #000;
    color: #fff;
    width: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    touch-action: manipulation;
}
.calculator {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    padding-top: env(safe-area-inset-top);
    display: flex;
    flex-direction: column;
    background: #000;
    overflow: hidden;
    touch-action: manipulation;
}
.header {
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 20px;
    height: 40px;
    background: #000;
}
.menu-icon {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
}
.menu-icon svg { width: 28px; height: 22px; }
#menuDots .menu-dot { fill: #ff9f0a; transition: opacity 0.2s; }
#menuDots .menu-line { fill: none; stroke: #ff9f0a; stroke-width: 2.5; stroke-linecap: round; }
body.auto-count-mode #menuDots #dotBot { opacity: 0; }
body.dots-hidden #menuDots .menu-dot { opacity: 0 !important; }

#menuClock { display: none; }
#menuClock circle { stroke: #f5f5f5; stroke-width: 1.6; fill: none; }
#menuClock line  { stroke: #f5f5f5; stroke-width: 1.6; stroke-linecap: round; }
.mode-indicator { font-size: 12px; color: #ff9f0a; font-weight: 600; opacity: 0; }
.header-calc {
    border-radius: 999px; border: none; background: transparent;
    display: none; align-items: center; justify-content: center;
    position: relative; cursor: pointer;
    width: 40px; height: 40px;
}
.header-calc .calc-icon-svg { width: 22px; height: 24px; }
.top-icon {
    width: 40px; height: 40px;
    border-radius: 999px;
    align-items: center; justify-content: center;
}
body.ios26-theme .top-icon { background: #1c1c1e; border: 1px solid #2c2c2e; }
.delay-dot {
    position: absolute; bottom: -4px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%;
    background: #0a84ff; opacity: 0;
    transition: opacity 0.15s; pointer-events: none;
}
.display {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 0 24px 10px 24px;
    overflow: hidden; background: #000;
    -webkit-mask-image: linear-gradient(
        to right,
        transparent 0px,
        black 24px,
        black calc(100% - 24px),
        transparent 100%
    );
    mask-image: linear-gradient(
        to right,
        transparent 0px,
        black 24px,
        black calc(100% - 24px),
        transparent 100%
    );
}
.expression-text {
    font-size: clamp(16px, 4vw, 30px); font-weight: 400;
    text-align: right; color: #888;
    margin-bottom: 2px; min-height: 1.2em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    opacity: 0; transition: opacity 0.2s;
}
.expression-text.visible { opacity: 1; }
.display-text {
    font-size: clamp(48px, 13vw, 90px); font-weight: 400;
    text-align: right; line-height: 1;
    white-space: nowrap; overflow-x: auto; overflow-y: hidden;
    scrollbar-width: none; -ms-overflow-style: none; direction: ltr;
}
.display-text::-webkit-scrollbar { display: none; }
.buttons { flex-shrink: 0; background: #000; margin-top: auto; }
:root { --btn-w: calc((100vw - 58px) / 4); }
.button-grid {
    display: grid;
    grid-template-columns: repeat(4, var(--btn-w));
    grid-auto-rows: var(--btn-w);
    gap: 6px;
    padding: 0 20px 4px 20px;
    width: 100%;
}
.button {
    width: var(--btn-w); height: var(--btn-w);
    position: relative; border-radius: 50%; border: none;
    cursor: pointer; transition: filter 0.1s;
    overflow: visible; transform: scale(0.96);
    transform-origin: center center; touch-action: manipulation;
}
.button-content {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: calc(var(--btn-w) * 0.36); font-weight: 600;
}
.button:active {
    filter: brightness(0.65);
    transform: scale(0.88) !important;
    transition: transform 0.08s ease, filter 0.08s ease;
}
.button {
    /* 릴리즈 시 스프링 효과 */
    transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.15s ease;
}

/* 버튼 눌림 애니메이션 */
.button.auto-pressing {
    animation: buttonPress 0.18s ease;
}
@keyframes buttonPress {
    0%   { transform: scale(0.96); filter: brightness(1); }
    40%  { transform: scale(0.82); filter: brightness(0.7); }
    100% { transform: scale(0.96); filter: brightness(1); }
}

.button.number   { background: #333; color: #fff; }
.button.operator { background: #ff9f0a; color: #fff; }
.button.operator .button-content { font-size: calc(var(--btn-w) * 0.60); font-weight: 300; transform: translateY(-3px); }
.button.function { background: #505050; color: #fff; }
.button.function .button-content { font-size: calc(var(--btn-w) * 0.30); }
.button.calc-icon { background: #333; color: #fff; position: relative; }
.calc-icon-svg  { width: calc(var(--btn-w) * 0.44); height: calc(var(--btn-w) * 0.44); }
.backspace-icon { width: calc(var(--btn-w) * 0.46); height: calc(var(--btn-w) * 0.46); }
.pm-icon        { width: calc(var(--btn-w) * 0.38); height: calc(var(--btn-w) * 0.38); }

/* ===== 기존 설정 모달 ===== */
.settings-modal {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; animation: fadeIn 0.3s;
}
.settings-modal.active { display: flex; }
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
.settings-content {
    background: #1c1c1e; border-radius: 20px;
    padding: 30px; width: 90%; max-width: 400px;
    animation: slideUp 0.3s;
}
@keyframes slideUp {
    from { transform: translateY(50px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
}
.settings-title { font-size: 24px; font-weight: 600; margin-bottom: 30px; text-align: center; }
.setting-item { margin-bottom: 25px; }
.setting-label { font-size: 16px; margin-bottom: 10px; color: #a5a5a5; }
.force-input {
    width: 100%; background: #2c2c2e; border: none; border-radius: 12px;
    padding: 15px 20px; font-size: 24px; color: #fff; text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
}
.force-input:focus { outline: none; background: #3a3a3c; }
.close-button {
    width: 100%; background: #ff9f0a; border: none; border-radius: 12px;
    padding: 15px; font-size: 18px; color: #fff; font-weight: 600;
    cursor: pointer; margin-top: 20px;
}
.close-button:active { opacity: 0.8; }

/* ===== 관리자 패널 ===== */
.admin-panel {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #0a0a0a;
    display: none; flex-direction: column;
    z-index: 2000;
    padding: calc(env(safe-area-inset-top) + 16px) 20px calc(env(safe-area-inset-bottom) + 16px);
    overflow-y: auto;
    animation: fadeIn 0.25s;
}
.admin-panel.active { display: flex; }

.admin-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
}
.admin-title { font-size: 26px; font-weight: 700; }
.admin-close {
    width: 36px; height: 36px; border-radius: 50%;
    background: #2c2c2e; border: none; color: #fff;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}
.admin-close:active { opacity: 0.7; }

.admin-section {
    background: #1c1c1e; border-radius: 16px;
    padding: 18px 20px; margin-bottom: 14px;
}
.admin-section-title {
    font-size: 11px; font-weight: 600; color: #636366;
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 14px;
}

/* 딜레이 설정 */
.delay-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
}
.delay-row:last-child { margin-bottom: 0; }
.delay-row-label { font-size: 15px; color: #fff; }
.delay-input {
    width: 80px; background: #2c2c2e; border: none; border-radius: 10px;
    padding: 8px 12px; font-size: 16px; color: #fff; text-align: center;
    font-family: -apple-system, sans-serif;
}
.delay-input:focus { outline: none; background: #3a3a3c; }
.delay-unit { font-size: 13px; color: #636366; margin-left: 6px; min-width: 20px; }

/* 알림 */
.notify-btn {
    width: 100%; background: #ff9f0a; border: none; border-radius: 12px;
    padding: 14px; font-size: 16px; font-weight: 600; color: #fff; cursor: pointer;
}
.notify-btn:active { opacity: 0.75; }
.notify-btn:disabled { background: #2c2c2e; color: #636366; cursor: not-allowed; }
.notify-status {
    margin-top: 10px; font-size: 13px; color: #636366;
    text-align: center; min-height: 18px; line-height: 1.5;
}
.notify-status.ok  { color: #30d158; }
.notify-status.err { color: #ff453a; }
.notify-status.warn { color: #ff9f0a; }

/* URL 생성 */
.gen-btn {
    width: 100%; background: #2c2c2e; border: none; border-radius: 12px;
    padding: 13px; font-size: 15px; font-weight: 600; color: #fff;
    cursor: pointer; margin-bottom: 10px;
}
.gen-btn:active { opacity: 0.7; }
.url-row { display: flex; gap: 8px; align-items: center; }
.url-input {
    flex: 1; background: #2c2c2e; border: none; border-radius: 10px;
    padding: 11px 14px; font-size: 12px; color: #fff; font-family: monospace;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.copy-btn {
    flex-shrink: 0; background: #2c2c2e; border: none; border-radius: 10px;
    padding: 11px 16px; font-size: 14px; color: #ff9f0a; font-weight: 600; cursor: pointer;
}
.copy-btn:active { opacity: 0.7; }

/* 수신 내역 */
.log-list { display: flex; flex-direction: column; gap: 8px; }
.log-item {
    background: #2c2c2e; border-radius: 12px; padding: 14px 16px;
    animation: slideIn 0.25s ease;
}
.log-item.new-item { border: 1px solid #ff9f0a44; }
@keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
}
.log-expr { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.log-meta { display: flex; justify-content: space-between; font-size: 12px; color: #636366; }
.log-id {
    background: #3a3a3c; border-radius: 6px; padding: 2px 8px;
    font-size: 11px; color: #ff9f0a; font-family: monospace;
}
.empty-msg { text-align: center; color: #48484a; font-size: 14px; padding: 28px 0; }
.badge {
    display: inline-block; background: #ff453a; color: #fff;
    font-size: 10px; font-weight: 700; border-radius: 999px;
    padding: 2px 7px; margin-left: 6px; vertical-align: middle;
}

/* iOS26 테마 */
body.ios26-theme #menuDots  { display: none; }
body.ios26-theme #menuClock { display: block; }
body.ios26-theme .header-calc { display: flex; }
body.ios26-theme .header-calc .calc-icon-svg rect:first-of-type { fill: #fff; stroke: #fff; }
body.ios26-theme .header-calc .calc-icon-svg rect:nth-of-type(2) { fill: #3a3a3c; }
body.ios26-theme .header-calc .calc-icon-svg circle { fill: #2c2c2e; }
body.ios26-theme .button { transform: scale(0.94); background: radial-gradient(circle at 20% 0%, #4a4a4e, #151516); }
body.ios26-theme .button.number   { background: radial-gradient(circle at 20% 0%, #454549, #111112); }
body.ios26-theme .button.function { background: radial-gradient(circle at 20% 0%, #505054, #18181a); }
body.ios26-theme .button.operator { background: radial-gradient(circle at 20% 0%, #ffb340, #a85c00); }
body.ios26-theme .button::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    border: 1px solid rgba(255,255,255,0.20);
    box-shadow: 0 10px 18px rgba(0,0,0,0.7); pointer-events: none;
}
body.ios26-theme .button.operator .button-content { font-size: calc(var(--btn-w) * 0.55); font-weight: 400; transform: translateY(-2px); }
body.ios26-theme .expression-text { color: #8e8e93; }
body.ios26-theme .display-text { font-weight: 500; }
#calcIconPlusMinus { display: none; font-size: calc(var(--btn-w) * 0.36); font-weight: 600; }
body.ios26-theme #calcIconSvg { display: none; }
body.ios26-theme #calcIconPlusMinus { display: block; }
</style>
</head>
<body>
<div class="calculator">
    <div class="header">
        <!-- 왼쪽: 메뉴 아이콘 (탭하면 관리자 패널) -->
        <div class="menu-icon top-icon" id="menuIcon">
            <svg id="menuDots" viewBox="0 0 24 24">
                <circle class="menu-dot" id="dotTop" cx="3" cy="5" r="1.5"/>
                <line class="menu-line" x1="7" y1="5" x2="21" y2="5"/>
                <circle class="menu-dot" id="dotMid" cx="3" cy="12" r="1.5"/>
                <line class="menu-line" x1="7" y1="12" x2="21" y2="12"/>
                <circle class="menu-dot" id="dotBot" cx="3" cy="19" r="1.5"/>
                <line class="menu-line" x1="7" y1="19" x2="21" y2="19"/>
            </svg>
            <svg id="menuClock" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="9"/>
                <line id="clockMinute" x1="12" y1="12" x2="12" y2="5"/>
                <line id="clockHour"   x1="12" y1="12" x2="5"  y2="12"/>
            </svg>
        </div>
        <div class="mode-indicator" id="modeIndicator"></div>
        <button class="header-calc calc-icon-trigger top-icon" id="headerCalcButton">
            <svg class="calc-icon-svg" viewBox="0 0 24 24">
                <rect x="5.5" y="3.5" width="13" height="17" rx="1.4" fill="currentColor" stroke="currentColor" stroke-width="1.4"/>
                <rect x="7.2" y="5.2" width="9.6" height="4.2" rx="0.9" fill="#333"/>
                <circle cx="8.5"  cy="11.8" r="1.2" fill="#333"/>
                <circle cx="12"   cy="11.8" r="1.2" fill="#333"/>
                <circle cx="15.5" cy="11.8" r="1.2" fill="#333"/>
                <circle cx="8.5"  cy="15.3" r="1.2" fill="#333"/>
                <circle cx="12"   cy="15.3" r="1.2" fill="#333"/>
                <circle cx="15.5" cy="15.3" r="1.2" fill="#333"/>
                <circle cx="8.5"  cy="18.8" r="1.2" fill="#333"/>
                <circle cx="12"   cy="18.8" r="1.2" fill="#333"/>
                <circle cx="15.5" cy="18.8" r="1.2" fill="#333"/>
            </svg>
            <div class="delay-dot"></div>
        </button>
    </div>
    <div class="display">
        <div class="expression-text" id="expression"></div>
        <div class="display-text" id="display">0</div>
    </div>
    <div class="buttons">
        <div class="button-grid">
            <button class="button function" id="clearButton" onclick="handleClear()">
                <div class="button-content" id="clearButtonContent">AC</div>
            </button>
            <button class="button function" id="pmButton" onclick="handleFunction('±')">
                <div class="button-content" id="pmContent">
                    <svg class="pm-icon" viewBox="0 0 24 24">
                        <line x1="6" y1="18" x2="18" y2="6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                        <line x1="7" y1="5.2" x2="7" y2="10.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                        <line x1="4.2" y1="7.7" x2="9.8" y2="7.7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                        <line x1="12.2" y1="17.8" x2="17.2" y2="17.8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </div>
            </button>
            <button class="button function percent-button">
                <div class="button-content">%</div>
            </button>
            <button class="button operator" onclick="handleOperator('÷')">
                <div class="button-content">÷</div>
            </button>
            <button class="button number" onclick="handleNumber('7')"><div class="button-content">7</div></button>
            <button class="button number" onclick="handleNumber('8')"><div class="button-content">8</div></button>
            <button class="button number" onclick="handleNumber('9')"><div class="button-content">9</div></button>
            <button class="button operator" onclick="handleOperator('×')"><div class="button-content">×</div></button>
            <button class="button number" onclick="handleNumber('4')"><div class="button-content">4</div></button>
            <button class="button number" onclick="handleNumber('5')"><div class="button-content">5</div></button>
            <button class="button number" onclick="handleNumber('6')"><div class="button-content">6</div></button>
            <button class="button operator" onclick="handleOperator('−')"><div class="button-content">−</div></button>
            <button class="button number" onclick="handleNumber('1')"><div class="button-content">1</div></button>
            <button class="button number" onclick="handleNumber('2')"><div class="button-content">2</div></button>
            <button class="button number" onclick="handleNumber('3')"><div class="button-content">3</div></button>
            <button class="button operator" onclick="handleOperator('+')"><div class="button-content">+</div></button>
            <button class="button calc-icon calc-icon-trigger" id="calcIconButton" onclick="handleCalcIcon()">
                <div class="button-content">
                    <svg class="calc-icon-svg" id="calcIconSvg" viewBox="0 0 24 24">
                        <rect x="5.5" y="3.5" width="13" height="17" rx="1.4" fill="currentColor" stroke="currentColor" stroke-width="1.4"/>
                        <rect x="7.2" y="5.2" width="9.6" height="4.2" rx="0.9" fill="#333"/>
                        <circle cx="8.5"  cy="11.8" r="1.2" fill="#333"/>
                        <circle cx="12"   cy="11.8" r="1.2" fill="#333"/>
                        <circle cx="15.5" cy="11.8" r="1.2" fill="#333"/>
                        <circle cx="8.5"  cy="15.3" r="1.2" fill="#333"/>
                        <circle cx="12"   cy="15.3" r="1.2" fill="#333"/>
                        <circle cx="15.5" cy="15.3" r="1.2" fill="#333"/>
                        <circle cx="8.5"  cy="18.8" r="1.2" fill="#333"/>
                        <circle cx="12"   cy="18.8" r="1.2" fill="#333"/>
                        <circle cx="15.5" cy="18.8" r="1.2" fill="#333"/>
                    </svg>
                    <span id="calcIconPlusMinus">±</span>
                </div>
                <div class="delay-dot"></div>
            </button>
            <button class="button number" id="zeroButton"><div class="button-content">0</div></button>
            <button class="button number" onclick="handleNumber('.')"><div class="button-content">.</div></button>
            <button class="button operator equals-trigger" id="equalsButton" onclick="handleEquals()">
                <div class="button-content">=</div>
            </button>
        </div>
    </div>
</div>

<!-- 기존 포스 모드 설정 모달 -->
<div class="settings-modal" id="settingsModal">
    <div class="settings-content">
        <div class="settings-title">설정</div>
        <div class="setting-item">
            <div class="setting-label">포스 모드 숫자</div>
            <input type="number" class="force-input" id="forceNumberInput" placeholder="숫자 입력">
        </div>
        <button class="close-button" onclick="closeSettings()">완료</button>
    </div>
</div>

<!-- 관리자 패널 -->
<div class="admin-panel" id="adminPanel">
    <div class="admin-header">
        <div class="admin-title">관리자</div>
        <button class="admin-close" onclick="closeAdminPanel()">✕</button>
    </div>

    <!-- 자동 입력 딜레이 설정 -->
    <div class="admin-section">
        <div class="admin-section-title">⏱ 자동 입력 딜레이</div>
        <div class="delay-row">
            <div class="delay-row-label">0 두 번 탭 후 대기</div>
            <div style="display:flex;align-items:center">
                <input type="number" class="delay-input" id="autoInputDelay" value="3" min="0" max="60">
                <span class="delay-unit">초</span>
            </div>
        </div>
        <div class="delay-row">
            <div class="delay-row-label">숫자 간 입력 속도</div>
            <div style="display:flex;align-items:center">
                <input type="number" class="delay-input" id="digitInterval" value="0.3" min="0.1" max="2" step="0.1">
                <span class="delay-unit">초</span>
            </div>
        </div>
        <button class="gen-btn" style="margin-top:12px;margin-bottom:0" onclick="saveDelaySettings()">저장</button>
    </div>

    <!-- 푸시 알림 -->
    <div class="admin-section">
        <div class="admin-section-title">🔔 푸시 알림</div>
        <button class="notify-btn" id="notifyBtn" onclick="subscribeNotification()">이 기기에서 알림 받기</button>
        <div class="notify-status" id="notifyStatus"></div>
    </div>

    <!-- URL 생성 -->
    <div class="admin-section">
        <div class="admin-section-title">🔗 계산기 URL 생성</div>
        <button class="gen-btn" onclick="generateUrl()">새 URL 생성</button>

    // ===== % 두번 탭: 매직 계산식 생성 =====
    async function generateMagicExpression() {
        let target = null;
        try {
            const snap = await firebase.firestore()
                .collection('calculations')
                .orderBy('timestamp', 'desc')
                .limit(1)
                .get();
            if (!snap.empty) {
                const raw = snap.docs[0].data().result;
                target = parseInt(String(raw).replace(/,/g, ''));
            }
        } catch(e) {
            console.error('최신값 가져오기 실패:', e);
            return;
        }

        console.log('매직 타겟:', target);
        if (!target || isNaN(target) || target <= 0) return;

        const expr = makeMagicExpr(target);
        console.log('생성된 식:', expr);
        if (!expr) { console.warn('식 생성 실패'); return; }

        // 계산기에 식 표시 (fullExpression은 계산 가능한 형태로)
        resetAll();
        fullExpression = expr.raw;      // 계산용: "37×18÷2+5"
        currentValue = '0';
        updateDisplay(expr.display);    // 표시용: "37×18÷2+5"
        expressionDisplay.classList.remove('visible');
        shouldResetDisplay = false;
        updateClearButtonState();
    }

    function makeMagicExpr(target) {
        function fmt(n) {
            return String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // A 범위를 target 크기에 맞게 동적 조정
        const maxA = Math.min(99999, Math.floor(Math.sqrt(target * 10)) + 1);

        const candidates = [];

        for (let C = 2; C <= 9 && candidates.length < 3; C++) {
            for (let Dsign = 0; Dsign < 2 && candidates.length < 3; Dsign++) {
                const op = Dsign === 0 ? '+' : '−';
                const Dmin = Math.max(11, Math.floor(target * 0.00001));
                const Dmax = Math.min(Math.floor(target * 0.05), 999999);
                if (Dmin > Dmax) continue;

                for (let di = 0; di < 10 && candidates.length < 3; di++) {
                    const D = Dmin + Math.floor(Math.random() * (Dmax - Dmin + 1));
                    const mid = op === '+' ? target - D : target + D;
                    if (mid <= 0) continue;

                    const AB = mid * C;
                    const AMax = Math.min(maxA, Math.floor(Math.sqrt(AB)) + 1);
                    if (AMax < 11) continue;

                    for (let A = 11; A <= AMax; A++) {
                        if (AB % A !== 0) continue;
                        const B = AB / A;
                        if (B < 11) continue;

                        const check = A * B / C + (op === '+' ? D : -D);
                        if (Math.abs(check - target) > 0.001) continue;

                        candidates.push({
                            raw: `${A}×${B}÷${C}${op}${D}`,
                            display: `${fmt(A)}×${fmt(B)}÷${fmt(C)}${op}${fmt(D)}`
                        });
                        break;
                    }
                }
            }
        }

        if (candidates.length > 0) {
            return candidates[Math.floor(Math.random() * candidates.length)];
        }

        // 폴백: A × B + D
        for (let di = 0; di < 200; di++) {
            const op = Math.random() > 0.5 ? '+' : '−';
            const Dmax = Math.min(Math.floor(target * 0.05), 99999);
            const D = Math.max(11, Math.floor(Math.random() * Dmax));
            const AB = op === '+' ? target - D : target + D;
            if (AB <= 100) continue;

            const AMax = Math.min(maxA, Math.floor(Math.sqrt(AB)) + 1);
            for (let A = 11; A <= AMax; A++) {
                if (AB % A !== 0) continue;
                const B = AB / A;
                if (B < 11) continue;
                return {
                    raw: `${A}×${B}${op}${D}`,
                    display: `${fmt(A)}×${fmt(B)}${op}${fmt(D)}`
                };
            }
        }

        return null;
    }

    async function requestMotionPermission() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            try {
                const permission = await DeviceMotionEvent.requestPermission();
                if (permission === 'granted') startOrientationDetection();
                else { alert('모션 센서 권한이 필요합니다.'); autoCountMode = false; updateAutoCountUI(); }
            } catch(e) { alert('센서 권한 요청 실패.'); autoCountMode = false; updateAutoCountUI(); }
        } else { startOrientationDetection(); }
    }
    function startOrientationDetection() { window.addEventListener('deviceorientation', handleOrientation); }
    function stopOrientationDetection() {
        window.removeEventListener('deviceorientation', handleOrientation);
        stopCounting();
        if (countingStartDelay) { clearTimeout(countingStartDelay); countingStartDelay = null; }
    }
    function handleOrientation(event) {
        if (!autoCountMode) return;
        const beta = event.beta, gamma = event.gamma;
        let newOri = 'unknown';
        if (Math.abs(beta) > 150) newOri = 'down';
        else if (Math.abs(beta) < 30 && Math.abs(gamma) < 30) newOri = 'up';
        else if (beta > 70 && beta < 110) newOri = 'vertical';
        if (newOri !== currentOrientation) { currentOrientation = newOri; handleOrientationChange(newOri); }
    }
    function handleOrientationChange(ori) {
        switch(ori) {
            case 'down': stopCounting(); if(countingStartDelay){clearTimeout(countingStartDelay);countingStartDelay=null;} resetAll(); vibrateDevice(); break;
            case 'vertical': if(!countingInterval&&!countingStartDelay){vibrateDevice();countingStartDelay=setTimeout(()=>{startCounting();countingStartDelay=null;},2000);} break;
            case 'up': if(countingStartDelay){clearTimeout(countingStartDelay);countingStartDelay=null;} stopCounting(); if(autoCountMode){autoCountMode=false;stopOrientationDetection();currentOrientation='unknown';updateAutoCountUI();} vibrateDevice(); break;
        }
    }
    function startCounting() {
        if (countingInterval) return;
        if (currentValue === '0' || currentValue === '') { currentValue = '1'; fullExpression = '1'; updateDisplay(currentValue); }
        countingInterval = setInterval(() => {
            let num = parseInt(currentValue); if(isNaN(num))num=0; num++;
            currentValue = num.toString(); fullExpression = num.toString();
            updateDisplay(currentValue); updateClearButtonState();
        }, 1000);
        vibrateDevice();
    }
    function stopCounting() { if(countingInterval){clearInterval(countingInterval);countingInterval=null;vibrateDevice();} }
    function toggleAutoCountMode() {
        autoCountMode = !autoCountMode;
        if (autoCountMode) requestMotionPermission(); else { stopOrientationDetection(); currentOrientation='unknown'; }
        updateAutoCountUI(); vibrateDevice();
    }
    function updateAutoCountUI() { document.body.classList.toggle('auto-count-mode', autoCountMode); updateModeIndicator(); }

    // ===== Clear 버튼 =====
    function updateClearButtonState() {
        const hasInput = (fullExpression !== '' || currentValue !== '0');
        if (!ios26Mode) {
            if (hasInput) { clearMode = 'backspace'; clearButtonContent.innerHTML = BACKSPACE_SVG; }
            else          { clearMode = 'all';       clearButtonContent.textContent = 'AC'; }
        } else {
            clearMode = 'all'; clearButtonContent.innerHTML = BACKSPACE_SVG;
        }
    }

    function updateModeIndicator() {
        if (ios26Mode && clockHour) {
            let x2=5, y2=12;
            if(autoCountMode){x2=6.5;y2=8.5;} else if(currentMode==='force'){x2=7;y2=17;} else if(currentMode==='666'){x2=7;y2=7;}
            clockHour.setAttribute('x2',String(x2)); clockHour.setAttribute('y2',String(y2));
            modeIndicator.textContent=''; return;
        }
        if(autoCountMode){dotTop.style.opacity='1';dotMid.style.opacity='1';dotBot.style.opacity='0';}
        else if(currentMode==='force'){dotTop.style.opacity='0';dotMid.style.opacity='1';dotBot.style.opacity='1';}
        else if(currentMode==='666'){dotTop.style.opacity='1';dotMid.style.opacity='0';dotBot.style.opacity='1';}
        else{dotTop.style.opacity='1';dotMid.style.opacity='1';dotBot.style.opacity='1';}
        modeIndicator.textContent='';
    }

    function applyLayoutMode() {
        document.body.classList.toggle('ios26-theme', ios26Mode);
        if (ios26Mode) pmContent.textContent = 'AC';
        else pmContent.innerHTML = pmOriginalHTML;
        updateClearButtonState(); updateModeIndicator();
    }

    // ===== 탭 이벤트 =====
    calcIconButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            calcIconTapCount++;
            if (calcIconTapTimer) clearTimeout(calcIconTapTimer);
            calcIconTapTimer = setTimeout(() => { calcIconTapCount = 0; }, TAP_TIMEOUT);
            if (calcIconTapCount === 3) { calcIconTapCount=0; clearTimeout(calcIconTapTimer); vibrateDevice(); openSettings(); }
        });
        btn.addEventListener('touchstart', () => { longPressTimer = setTimeout(() => { vibrateDevice(); openSettings(); }, LONG_PRESS_DURATION); });
        btn.addEventListener('touchend',   () => clearTimeout(longPressTimer));
        btn.addEventListener('touchmove',  () => clearTimeout(longPressTimer));
        btn.addEventListener('mousedown',  () => { longPressTimer = setTimeout(() => { vibrateDevice(); openSettings(); }, LONG_PRESS_DURATION); });
        btn.addEventListener('mouseup',    () => clearTimeout(longPressTimer));
        btn.addEventListener('mouseleave', () => clearTimeout(longPressTimer));
    });

    equalsButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            equalsTapCount++;
            if (equalsTapTimer) clearTimeout(equalsTapTimer);
            equalsTapTimer = setTimeout(() => { equalsTapCount = 0; }, TAP_TIMEOUT);
            if (equalsTapCount === 3) {
                equalsTapCount=0; clearTimeout(equalsTapTimer); vibrateDevice();
                clearAllDelayTimers(); specialSequenceActive=false; lastResultWas666=false; sequenceStarted=false;
                currentMode = (currentMode === '666') ? 'normal' : '666'; updateModeIndicator();
            }
        });
    });

    document.querySelector('.percent-button').addEventListener('click', () => {
        percentTapCount++;
        if (percentTapTimer) clearTimeout(percentTapTimer);
        percentTapTimer = setTimeout(() => { percentTapCount = 0; }, TAP_TIMEOUT);

        if (percentTapCount === 2) {
            percentTapCount = 0;
            clearTimeout(percentTapTimer);
            generateMagicExpression();
            return;
        }
        if (percentTapCount === 3) {
            percentTapCount = 0;
            clearTimeout(percentTapTimer);
            toggleAutoCountMode();
            return;
        }

        // 1번 탭: 일반 % 기능
        handleFunction('%');
    });

    displayElement.addEventListener('click', () => {
        displayTapCount++;
        if (displayTapTimer) clearTimeout(displayTapTimer);
        displayTapTimer = setTimeout(() => { displayTapCount = 0; }, DISPLAY_TAP_TIMEOUT);
        if (displayTapCount === 3) { displayTapCount=0; clearTimeout(displayTapTimer); ios26Mode=!ios26Mode; applyLayoutMode(); }
    });

    forceNumberInput.addEventListener('input', e => { const v = e.target.value; forceNumber = v==='' ? null : parseFloat(v); });

    function openSettings()  { settingsModal.classList.add('active'); forceNumberInput.focus(); }
    function closeSettings() {
        settingsModal.classList.remove('active');
        if (forceNumber !== null && !isNaN(forceNumber)) { currentMode='force'; updateModeIndicator(); }
    }
    function vibrateDevice() { if('vibrate' in navigator) navigator.vibrate(50); }

    // ===== 디스플레이 =====
    function updateDisplay(value) {
        const containerWidth = displayElement.parentElement.offsetWidth - 48;
        let formattedValue = formatDisplayExpression(value);
        displayElement.textContent = formattedValue;
        const me = document.createElement('span');
        me.style.cssText = `font-weight:${ios26Mode?'500':'400'};font-family:${getComputedStyle(displayElement).fontFamily};visibility:hidden;position:absolute;white-space:nowrap`;
        me.textContent = formattedValue;
        document.body.appendChild(me);
        let fs = 80; me.style.fontSize = fs + 'px';
        if (me.offsetWidth > containerWidth) { fs = Math.max(Math.floor(fs*0.6), Math.floor((containerWidth/me.offsetWidth)*fs)); }
        document.body.removeChild(me);
        displayElement.style.fontSize = fs + 'px';
        setTimeout(() => { if(displayElement.scrollWidth>displayElement.clientWidth) displayElement.scrollLeft=displayElement.scrollWidth-displayElement.clientWidth; }, 0);
    }
    function updateExpression(text) { expressionDisplay.textContent = text; }

    // ===== 입력 처리 =====
    function handleNumber(num) {
        vibrateDevice();
        if (autoCountMode) return;
        const lastChar = fullExpression.slice(-1);
        if (shouldResetDisplay) {
            if (fullExpression && '÷×−+'.includes(lastChar)) { currentValue=(num==='.'?'0.':num); fullExpression+=(num==='.'?'0.':num); }
            else { currentValue=(num==='.'?'0.':num); fullExpression=(num==='.'?'0.':num); }
            shouldResetDisplay = false;
        } else {
            if (currentValue==='0' && num!=='.') {
                currentValue=num;
                if(fullExpression==='0'||fullExpression==='') fullExpression=num; else fullExpression+=num;
            } else {
                if(num==='.'&&currentValue.includes('.')) return;
                currentValue+=num; fullExpression+=num;
            }
        }
        updateDisplay(fullExpression||currentValue);
        if (currentMode==='666'&&lastResultWas666&&!sequenceStarted) {
            const clean=fullExpression.replace(/,/g,'');
            if(clean==='666+666'){
                lastResultWas666=false;sequenceStarted=true;specialSequenceActive=true;
                expressionDisplay.classList.remove('visible');updateExpression('');
                runDelayWithDot(DELAY_666_STAGE1,DOT_STAGE1_APPEAR,DOT_STAGE1_DISAPPEAR_BEFORE,()=>{
                    if(!specialSequenceActive||currentMode!=='666')return;
                    fullExpression='999+999';currentValue='999';updateDisplay(fullExpression);updateClearButtonState();
                });
            }
        }
        updateClearButtonState();
    }

    function handleOperator(op) {
        vibrateDevice(); if(autoCountMode)return;
        if(shouldResetDisplay){expressionDisplay.classList.remove('visible');updateExpression('');shouldResetDisplay=false;}
        if(fullExpression&&'÷×−+'.includes(fullExpression.slice(-1))) fullExpression=fullExpression.slice(0,-1)+op;
        else fullExpression=(fullExpression==='')?currentValue+op:fullExpression+op;
        currentValue='0'; updateDisplay(fullExpression); updateClearButtonState();
    }

    function handleFunction(func) {
        vibrateDevice();
        switch(func) {
            case '±':
                if(ios26Mode){resetAll();updateClearButtonState();return;}
                if(autoCountMode)return;
                if(currentValue!=='0'){
                    const num=parseFloat(currentValue); currentValue=(-num).toString();
                    const m=fullExpression.match(/[\d.]+$/);
                    if(m) fullExpression=fullExpression.slice(0,-m[0].length)+currentValue; else fullExpression=currentValue;
                    updateDisplay(fullExpression||currentValue);
                }
                break;
            case '%':
                if(autoCountMode)return;
                if(currentValue!=='0'){
                    const numP=parseFloat(currentValue)/100; currentValue=numP.toString();
                    const mp=fullExpression.match(/[\d.]+$/);
                    if(mp) fullExpression=fullExpression.slice(0,-mp[0].length)+currentValue; else fullExpression=currentValue;
                    updateDisplay(fullExpression||currentValue);
                }
                break;
        }
        updateClearButtonState();
    }

    function resetAll() {
        clearAllDelayTimers(); specialSequenceActive=false; lastResultWas666=false; sequenceStarted=false;
        stopCounting(); if(countingStartDelay){clearTimeout(countingStartDelay);countingStartDelay=null;}
        currentValue='0'; fullExpression=''; shouldResetDisplay=false;
        expressionDisplay.classList.remove('visible'); updateExpression(''); updateDisplay('0'); clearMode='all';
    }

    function handleClear() {
        vibrateDevice(); if(ios26Mode){handleBackspace();return;}
        if(clearMode==='all'){resetAll();}
        else{
            if(fullExpression){fullExpression=fullExpression.slice(0,-1);const m=fullExpression.match(/([\d.]+)$/);currentValue=m?m[1]:'0';}
            else{if(currentValue.length>1&&currentValue!=='Error')currentValue=currentValue.slice(0,-1);else currentValue='0';}
            if(fullExpression===''&&currentValue==='0'){expressionDisplay.classList.remove('visible');updateExpression('');}
            updateDisplay(fullExpression||currentValue);
        }
        updateClearButtonState();
    }

    function handleBackspace() {
        clearAllDelayTimers(); specialSequenceActive=false; lastResultWas666=false; sequenceStarted=false;
        if(fullExpression){fullExpression=fullExpression.slice(0,-1);const m=fullExpression.match(/([\d.]+)$/);currentValue=m?m[1]:'0';}
        else{if(currentValue.length>1&&currentValue!=='Error')currentValue=currentValue.slice(0,-1);else currentValue='0';}
        if(fullExpression===''&&currentValue==='0'){expressionDisplay.classList.remove('visible');updateExpression('');}
        updateDisplay(fullExpression||currentValue); updateClearButtonState();
    }

    function handleCalcIcon() { if(ios26Mode)handleFunction('±'); }

    function handleEquals() {
        vibrateDevice(); if(autoCountMode)return;
        if(!fullExpression||fullExpression==='0')return;
        let result; const cleanExpr=fullExpression.replace(/,/g,'');

        if(currentMode==='force'&&forceNumber!==null){
            updateExpression(formatDisplayExpression(fullExpression)+'='); expressionDisplay.classList.add('visible');
            result=forceNumber; currentMode='normal'; clearAllDelayTimers(); specialSequenceActive=false; lastResultWas666=false; sequenceStarted=false; updateModeIndicator();
        } else if(currentMode==='666'){
            if(specialSequenceActive&&cleanExpr==='999+999'){
                updateExpression(formatDisplayExpression(fullExpression)+'='); expressionDisplay.classList.add('visible');
                result=evaluateExpression(cleanExpr);
                runDelayWithDot(DELAY_666_STAGE2,DOT_STAGE2_APPEAR,DOT_STAGE2_DISAPPEAR_BEFORE,()=>{
                    if(!specialSequenceActive||currentMode!=='666')return;
                    updateExpression('666+666='); expressionDisplay.classList.add('visible');
                    runDelayWithDot(DELAY_666_STAGE3,DOT_STAGE3_APPEAR,DOT_STAGE3_DISAPPEAR_BEFORE,()=>{
                        if(!specialSequenceActive||currentMode!=='666')return;
                        currentValue='1332'; updateDisplay(formatNumber(1332));
                        specialSequenceActive=false; lastResultWas666=false; sequenceStarted=false; currentMode='normal'; updateModeIndicator();
                    });
                });
            } else {
                updateExpression(formatDisplayExpression(fullExpression)+'='); expressionDisplay.classList.add('visible');
                result=evaluateExpression(cleanExpr);
            }
        } else {
            updateExpression(formatDisplayExpression(fullExpression)+'='); expressionDisplay.classList.add('visible');
            try{result=evaluateExpression(cleanExpr);}catch(e){result='Error';}
        }

        if(result==='Error'||isNaN(result)||!isFinite(result)){currentValue='Error';updateDisplay('Error');}
        else{currentValue=result.toString();updateDisplay(formatNumber(result));}

        if(currentMode==='666'&&Number(result)===666){lastResultWas666=true;sequenceStarted=false;}
        else{lastResultWas666=false;sequenceStarted=false;}

        fullExpression=''; shouldResetDisplay=true;
        if(!ios26Mode){clearMode='all';clearButtonContent.textContent='AC';}
    }

    function evaluateExpression(expr) {
        expr=expr.replace(/\s/g,'').replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
        try{return Function('"use strict";return('+expr+')')();}catch(e){return 'Error';}
    }
    function formatNumber(num) {
        if(typeof num==='string')num=parseFloat(num); if(isNaN(num))return '0';
        if(Math.abs(num)>=1e10||(Math.abs(num)<1e-6&&num!==0))return num.toExponential(6).replace(/e\+?/,'e');
        let numStr=num.toString(); if(numStr.includes('e'))return numStr;
        let parts=numStr.split('.'); let int=parts[0]; let dec=parts[1]||'';
        int=int.replace(/\B(?=(\d{3})+(?!\d))/g,',');
        if(dec){dec=dec.substring(0,8).replace(/0+$/,'');if(dec)return int+'.'+dec;}
        return int;
    }
    function formatDisplayExpression(expr) {
        return expr.replace(/\d+\.?\d*/g,match=>{
            let num=parseFloat(match); if(isNaN(num))return match;
            let parts=match.split('.'); parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,','); return parts.join('.');
        });
    }

    settingsModal.addEventListener('click', e => { if(e.target===settingsModal)closeSettings(); });


    // ===== 버튼 터치 애니메이션 (iOS 웹앱 대응) =====
    document.querySelectorAll('.button').forEach(btn => {
        btn.addEventListener('touchstart', () => {
            btn.style.transform = 'scale(0.88)';
            btn.style.filter = 'brightness(0.65)';
        }, { passive: true });
        btn.addEventListener('touchend', () => {
            btn.style.transform = '';
            btn.style.filter = '';
        }, { passive: true });
        btn.addEventListener('touchcancel', () => {
            btn.style.transform = '';
            btn.style.filter = '';
        }, { passive: true });
    });

        // 초기화
    loadDelayConfigFromURL();
    updateDisplay(currentValue);
    updateClearButtonState();
    updateModeIndicator();
    applyLayoutMode();
</script>
</body>
</html>
