<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                   user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>계산기</title>

<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-180.png">

<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            background: #000;
            color: #fff;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont,
                         'SF Pro Display', 'Helvetica Neue', sans-serif;
            touch-action: manipulation;
        }

        /* ============================================
           CSS 변수로 모든 크기값 중앙관리
           100dvh 기준으로 비례 계산
           ============================================ */
        :root {
            /* 버튼 1개 크기: 화면 너비 기준 (4열 + gap 3개 + 좌우 패딩) */
            --grid-pad-h: clamp(12px, 4.5vw, 22px);
            --grid-gap: clamp(5px, 1.8vw, 10px);
            /* 버튼 1개 너비 = (100vw - pad*2 - gap*3) / 4 */
            --btn-size: calc((100vw - var(--grid-pad-h) * 2 - var(--grid-gap) * 3) / 4);
            /* 5행 버튼 + 4개 gap + 위아래 패딩 */
            --grid-total-h: calc(var(--btn-size) * 5 + var(--grid-gap) * 4 + clamp(4px, 1dvh, 12px) * 2);

            /* 헤더 */
            --header-height: clamp(40px, 6dvh, 58px);
            --header-icon-size: clamp(32px, 4.5dvh, 42px);

            /* 디스플레이 = 나머지 공간 전부 */
            --display-font-size: clamp(52px, 9dvh, 92px);
            --expression-font-size: clamp(16px, 2.8dvh, 30px);

            /* 버튼 폰트: 버튼 크기 비례 */
            --btn-font-number:   calc(var(--btn-size) * 0.38);
            --btn-font-operator: calc(var(--btn-size) * 0.58);
            --btn-font-function: calc(var(--btn-size) * 0.30);

            /* 아이콘 */
            --icon-calc:      calc(var(--btn-size) * 0.42);
            --icon-backspace: calc(var(--btn-size) * 0.42);
            --icon-pm:        calc(var(--btn-size) * 0.36);
        }

        .calculator {
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            background: #000;
            overflow: hidden;
            padding-top: calc(env(safe-area-inset-top) * 0.85 + 3px);
            padding-bottom: env(safe-area-inset-bottom);
            touch-action: manipulation;
        }

        /* ---- 헤더 ---- */
        .header {
            flex-shrink: 0;
            height: var(--header-height);
            padding: 0 clamp(12px, 4vw, 24px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
        }

        .menu-icon {
            width: var(--header-icon-size);
            height: var(--header-icon-size);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-icon svg {
            width: clamp(22px, 3.5dvh, 32px);
            height: clamp(18px, 3dvh, 26px);
        }

        #menuDots .menu-dot {
            fill: #ff9f0a;
            transition: opacity 0.2s;
        }
        #menuDots .menu-line {
            fill: none;
            stroke: #ff9f0a;
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        body.auto-count-mode #menuDots #dotBot {
            opacity: 0;
        }

        #menuClock {
            display: none;
        }
        #menuClock circle {
            stroke: #f5f5f5;
            stroke-width: 1.6;
            fill: none;
        }
        #menuClock line {
            stroke: #f5f5f5;
            stroke-width: 1.6;
            stroke-linecap: round;
        }

        .mode-indicator {
            font-size: 12px;
            color: #ff9f0a;
            font-weight: 600;
            opacity: 0;
        }

        .header-calc {
            border-radius: 17px;
            border: none;
            background: transparent;
            display: none;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }

        .header-calc .calc-icon-svg {
            width: clamp(18px, 3dvh, 26px);
            height: clamp(20px, 3.2dvh, 28px);
        }

        .top-icon {
            width: var(--header-icon-size);
            height: var(--header-icon-size);
            border-radius: 999px;
            align-items: center;
            justify-content: center;
        }

        body.ios26-theme .top-icon {
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
        }

        .delay-dot {
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: clamp(3px, 0.6dvh, 5px);
            height: clamp(3px, 0.6dvh, 5px);
            border-radius: 50%;
            background: #0a84ff;
            opacity: 0;
            transition: opacity 0.15s;
            pointer-events: none;
        }

        /* ---- 디스플레이: 나머지 공간 전부 차지 ---- */
        .display {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 4px clamp(14px, 5vw, 28px) clamp(6px, 1dvh, 16px);
            overflow: hidden;
            background: #000;
        }

        .expression-text {
            font-size: var(--expression-font-size);
            font-weight: 400;
            text-align: right;
            color: #888;
            margin-bottom: 2px;
            min-height: calc(var(--expression-font-size) * 1.2);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .expression-text.visible {
            opacity: 1;
        }

        .display-text {
            font-size: var(--display-font-size);
            font-weight: 400;
            text-align: right;
            line-height: 1;
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
            direction: ltr;
            transform: translateY(2px);
        }
        .display-text::-webkit-scrollbar {
            display: none;
        }

        /* ---- 버튼 영역: 항상 고정 크기 ---- */
        .buttons {
            flex-shrink: 0;
            background: #000;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--grid-gap);
            width: 100%;
            padding: clamp(4px, 1dvh, 10px) var(--grid-pad-h) clamp(6px, 1.5dvh, 14px);
        }

        .button {
            width: 100%;
            /* aspect-ratio로 정사각형 유지 → padding-bottom 트릭 대체 */
            aspect-ratio: 1 / 1;
            position: relative;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: filter 0.1s;
            overflow: visible;
            transform: scale(0.96);
            transform-origin: center center;
            touch-action: manipulation;
        }

        .button-content {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--btn-font-number);
            font-weight: 600;
        }

        .button:active {
            filter: brightness(0.7);
        }

        .button.number {
            background: #333;
            color: #fff;
        }

        .button.operator {
            background: #ff9f0a;
            color: #fff;
        }
        .button.operator .button-content {
            font-size: var(--btn-font-operator);
            font-weight: 300;
            transform: translateY(-3px);
        }

        .button.function {
            background: #505050;
            color: #fff;
        }
        .button.function .button-content {
            font-size: var(--btn-font-function);
        }

        .button.zero {
            border-radius: 50%;
        }
        .button.zero .button-content {
            justify-content: center;
            padding-left: 0;
        }

        .button.calc-icon {
            background: #333;
            color: #fff;
            position: relative;
        }

        .calc-icon-svg {
            width: var(--icon-calc);
            height: var(--icon-calc);
        }

        .backspace-icon {
            width: var(--icon-backspace);
            height: var(--icon-backspace);
        }

        .pm-icon {
            width: var(--icon-pm);
            height: var(--icon-pm);
        }

        /* ---- 설정 모달 ---- */
        .settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .settings-modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .settings-content {
            background: #1c1c1e;
            border-radius: 20px;
            padding: clamp(20px, 4dvh, 34px);
            width: 90%;
            max-width: 400px;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .settings-title {
            font-size: clamp(18px, 3dvh, 26px);
            font-weight: 600;
            margin-bottom: clamp(16px, 3dvh, 32px);
            text-align: center;
        }

        .setting-item {
            margin-bottom: clamp(14px, 2.5dvh, 28px);
        }

        .setting-label {
            font-size: clamp(13px, 2dvh, 17px);
            margin-bottom: 10px;
            color: #a5a5a5;
        }

        .force-input {
            width: 100%;
            background: #2c2c2e;
            border: none;
            border-radius: 12px;
            padding: clamp(10px, 2dvh, 18px) 20px;
            font-size: clamp(18px, 3dvh, 26px);
            color: #fff;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
        }
        .force-input:focus {
            outline: none;
            background: #3a3a3c;
        }

        .close-button {
            width: 100%;
            background: #ff9f0a;
            border: none;
            border-radius: 12px;
            padding: clamp(10px, 2dvh, 18px);
            font-size: clamp(15px, 2.4dvh, 20px);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            margin-top: clamp(12px, 2dvh, 22px);
        }
        .close-button:active {
            opacity: 0.8;
        }

        /* ============================================
           iOS 26 테마
           ============================================ */
        body.ios26-theme #menuDots { display: none; }
        body.ios26-theme #menuClock { display: block; }
        body.ios26-theme .header-calc { display: flex; }

        body.ios26-theme .header-calc .calc-icon-svg rect:first-of-type {
            fill: #ffffff;
            stroke: #ffffff;
        }
        body.ios26-theme .header-calc .calc-icon-svg rect:nth-of-type(2) {
            fill: #3a3a3c;
        }
        body.ios26-theme .header-calc .calc-icon-svg circle {
            fill: #2c2c2e;
        }

        body.ios26-theme .button {
            transform: scale(0.94);
            border-radius: 999px;
            background: radial-gradient(circle at 20% 0%, #4a4a4e, #151516);
            position: relative;
        }

        body.ios26-theme .button.number {
            background: radial-gradient(circle at 20% 0%, #454549, #111112);
        }
        body.ios26-theme .button.function {
            background: radial-gradient(circle at 20% 0%, #505054, #18181a);
        }
        body.ios26-theme .button.operator {
            background: radial-gradient(circle at 20% 0%, #ffb340, #a85c00);
        }

        body.ios26-theme .button::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            border: 1px solid rgba(255, 255, 255, 0.20);
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.7);
            pointer-events: none;
        }

        body.ios26-theme .button.operator .button-content {
            font-size: calc(var(--btn-font-operator) * 0.92);
            font-weight: 400;
            transform: translateY(-2px);
        }

        body.ios26-theme .expression-text {
            font-size: calc(var(--expression-font-size) * 0.93);
            color: #8e8e93;
        }
        body.ios26-theme .display-text {
            font-weight: 500;
        }

        #calcIconPlusMinus {
            display: none;
            font-size: var(--btn-font-number);
            font-weight: 600;
        }
        body.ios26-theme #calcIconSvg {
            display: none;
        }
        body.ios26-theme #calcIconPlusMinus {
            display: block;
        }

        /* ============================================
           가로모드 (landscape) 대응
           ============================================ */
        @media (orientation: landscape) and (max-height: 500px) {
            :root {
                --header-height: clamp(32px, 8dvh, 44px);
                --display-font-size: clamp(36px, 10dvh, 64px);
                --expression-font-size: clamp(14px, 4dvh, 22px);
                --grid-gap: clamp(3px, 1dvh, 6px);
                --btn-font-number: clamp(18px, 5dvh, 30px);
                --btn-font-operator: clamp(26px, 7dvh, 44px);
                --btn-font-function: clamp(14px, 4dvh, 24px);
                --icon-calc: clamp(20px, 5.5dvh, 32px);
                --icon-backspace: clamp(20px, 5.5dvh, 32px);
                --icon-pm: clamp(18px, 4.5dvh, 28px);
            }
        }
    </style>
</head>
<body>
<div class="calculator">
    <div class="header">
        <div class="menu-icon top-icon" id="menuIcon">
            <svg id="menuDots" viewBox="0 0 24 24">
                <circle class="menu-dot" id="dotTop" cx="3" cy="5" r="1.5"/>
                <line class="menu-line" x1="7" y1="5" x2="21" y2="5"></line>
                <circle class="menu-dot" id="dotMid" cx="3" cy="12" r="1.5"/>
                <line class="menu-line" x1="7" y1="12" x2="21" y2="12"></line>
                <circle class="menu-dot" id="dotBot" cx="3" cy="19" r="1.5"/>
                <line class="menu-line" x1="7" y1="19" x2="21" y2="19"></line>
            </svg>
            <svg id="menuClock" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="9"/>
                <line id="clockMinute" x1="12" y1="12" x2="12" y2="5"/>
                <line id="clockHour" x1="12" y1="12" x2="5" y2="12"/>
            </svg>
        </div>

        <div class="mode-indicator" id="modeIndicator"></div>

        <button class="header-calc calc-icon-trigger top-icon" id="headerCalcButton">
            <svg class="calc-icon-svg" viewBox="0 0 24 24">
                <rect x="5.5" y="3.5" width="13" height="17" rx="1.4"
                      fill="currentColor" stroke="currentColor" stroke-width="1.4"/>
                <rect x="7.2" y="5.2" width="9.6" height="4.2" rx="0.9" fill="#333"/>
                <circle cx="8.5" cy="11.8" r="1.2" fill="#333"/>
                <circle cx="12"  cy="11.8" r="1.2" fill="#333"/>
                <circle cx="15.5" cy="11.8" r="1.2" fill="#333"/>
                <circle cx="8.5" cy="15.3" r="1.2" fill="#333"/>
                <circle cx="12"  cy="15.3" r="1.2" fill="#333"/>
                <circle cx="15.5" cy="15.3" r="1.2" fill="#333"/>
                <circle cx="8.5" cy="18.8" r="1.2" fill="#333"/>
                <circle cx="12"  cy="18.8" r="1.2" fill="#333"/>
                <circle cx="15.5" cy="18.8" r="1.2" fill="#333"/>
            </svg>
            <div class="delay-dot"></div>
        </button>
    </div>

    <div class="display">
        <div class="expression-text" id="expression"></div>
        <div class="display-text" id="display">0</div>
    </div>

    <div class="buttons">
        <div class="button-grid">
            <button class="button function" id="clearButton" onclick="handleClear()">
                <div class="button-content" id="clearButtonContent">AC</div>
            </button>

            <button class="button function" id="pmButton" onclick="handleFunction('±')">
                <div class="button-content" id="pmContent">
                    <svg class="pm-icon" viewBox="0 0 24 24">
                        <line x1="6" y1="18" x2="18" y2="6"
                              stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                        <line x1="7" y1="5.2" x2="7" y2="10.2"
                              stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                        <line x1="4.2" y1="7.7" x2="9.8" y2="7.7"
                              stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                        <line x1="12.2" y1="17.8" x2="17.2" y2="17.8"
                              stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </div>
            </button>

            <button class="button function percent-button" onclick="handleFunction('%')">
                <div class="button-content">%</div>
            </button>

            <button class="button operator" onclick="handleOperator('÷')">
                <div class="button-content">÷</div>
            </button>

            <button class="button number" onclick="handleNumber('7')">
                <div class="button-content">7</div>
            </button>
            <button class="button number" onclick="handleNumber('8')">
                <div class="button-content">8</div>
            </button>
            <button class="button number" onclick="handleNumber('9')">
                <div class="button-content">9</div>
            </button>
            <button class="button operator" onclick="handleOperator('×')">
                <div class="button-content">×</div>
            </button>

            <button class="button number" onclick="handleNumber('4')">
                <div class="button-content">4</div>
            </button>
            <button class="button number" onclick="handleNumber('5')">
                <div class="button-content">5</div>
            </button>
            <button class="button number" onclick="handleNumber('6')">
                <div class="button-content">6</div>
            </button>
            <button class="button operator" onclick="handleOperator('−')">
                <div class="button-content">−</div>
            </button>

            <button class="button number" onclick="handleNumber('1')">
                <div class="button-content">1</div>
            </button>
            <button class="button number" onclick="handleNumber('2')">
                <div class="button-content">2</div>
            </button>
            <button class="button number" onclick="handleNumber('3')">
                <div class="button-content">3</div>
            </button>
            <button class="button operator" onclick="handleOperator('+')">
                <div class="button-content">+</div>
            </button>

            <button class="button calc-icon calc-icon-trigger" id="calcIconButton" onclick="handleCalcIcon()">
                <div class="button-content">
                    <svg class="calc-icon-svg" id="calcIconSvg" viewBox="0 0 24 24">
                        <rect x="5.5" y="3.5" width="13" height="17" rx="1.4"
                              fill="currentColor" stroke="currentColor" stroke-width="1.4"/>
                        <rect x="7.2" y="5.2" width="9.6" height="4.2" rx="0.9" fill="#333"/>
                        <circle cx="8.5" cy="11.8" r="1.2" fill="#333"/>
                        <circle cx="12"  cy="11.8" r="1.2" fill="#333"/>
                        <circle cx="15.5" cy="11.8" r="1.2" fill="#333"/>
                        <circle cx="8.5" cy="15.3" r="1.2" fill="#333"/>
                        <circle cx="12"  cy="15.3" r="1.2" fill="#333"/>
                        <circle cx="15.5" cy="15.3" r="1.2" fill="#333"/>
                        <circle cx="8.5" cy="18.8" r="1.2" fill="#333"/>
                        <circle cx="12"  cy="18.8" r="1.2" fill="#333"/>
                        <circle cx="15.5" cy="18.8" r="1.2" fill="#333"/>
                    </svg>
                    <span id="calcIconPlusMinus">±</span>
                </div>
                <div class="delay-dot"></div>
            </button>

            <button class="button number zero" onclick="handleNumber('0')">
                <div class="button-content">0</div>
            </button>

            <button class="button number" onclick="handleNumber('.')">
                <div class="button-content">.</div>
            </button>

            <button class="button operator equals-trigger" id="equalsButton" onclick="handleEquals()">
                <div class="button-content">=</div>
            </button>
        </div>
    </div>
</div>

<!-- 설정 모달 -->
<div class="settings-modal" id="settingsModal">
    <div class="settings-content">
        <div class="settings-title">설정</div>
        <div class="setting-item">
            <div class="setting-label">포스 모드 숫자</div>
            <input type="number" class="force-input" id="forceNumberInput" placeholder="숫자 입력">
        </div>
        <button class="close-button" onclick="closeSettings()">완료</button>
    </div>
</div>

<script>
    let currentValue = '0';
    let fullExpression = '';
    let shouldResetDisplay = false;
    let forceNumber = null;

    let currentMode = 'normal';
    let specialSequenceActive = false;

    let lastResultWas666 = false;
    let sequenceStarted = false;

    let calcIconTapCount = 0;
    let calcIconTapTimer = null;
    let equalsTapCount = 0;
    let equalsTapTimer = null;
    let percentTapCount = 0;
    let percentTapTimer = null;
    const TAP_TIMEOUT = 500;

    let ios26Mode = false;
    let displayTapCount = 0;
    let displayTapTimer = null;
    const DISPLAY_TAP_TIMEOUT = 500;

    let longPressTimer = null;
    const LONG_PRESS_DURATION = 3000;

    let clearMode = 'all';

    let autoCountMode = false;
    let countingInterval = null;
    let countingStartDelay = null;
    let currentOrientation = 'unknown';

    const DEFAULT_DELAY_666_STAGE1 = 5000;
    const DEFAULT_DELAY_666_STAGE2 = 10000;
    const DEFAULT_DELAY_666_STAGE3 = 5000;

    const DEFAULT_DOT_STAGE1_APPEAR = 0;
    const DEFAULT_DOT_STAGE1_DISAPPEAR_BEFORE = 2000;
    const DEFAULT_DOT_STAGE2_APPEAR = 3000;
    const DEFAULT_DOT_STAGE2_DISAPPEAR_BEFORE = 2000;
    const DEFAULT_DOT_STAGE3_APPEAR = 3000;
    const DEFAULT_DOT_STAGE3_DISAPPEAR_BEFORE = 2000;

    let DELAY_666_STAGE1 = DEFAULT_DELAY_666_STAGE1;
    let DELAY_666_STAGE2 = DEFAULT_DELAY_666_STAGE2;
    let DELAY_666_STAGE3 = DEFAULT_DELAY_666_STAGE3;

    let DOT_STAGE1_APPEAR = DEFAULT_DOT_STAGE1_APPEAR;
    let DOT_STAGE1_DISAPPEAR_BEFORE = DEFAULT_DOT_STAGE1_DISAPPEAR_BEFORE;
    let DOT_STAGE2_APPEAR = DEFAULT_DOT_STAGE2_APPEAR;
    let DOT_STAGE2_DISAPPEAR_BEFORE = DEFAULT_DOT_STAGE2_DISAPPEAR_BEFORE;
    let DOT_STAGE3_APPEAR = DEFAULT_DOT_STAGE3_APPEAR;
    let DOT_STAGE3_DISAPPEAR_BEFORE = DEFAULT_DOT_STAGE3_DISAPPEAR_BEFORE;

    function loadDelayConfigFromURL() {
        try {
            const params = new URLSearchParams(window.location.search);
            const getMs = (key, def) => {
                const v = params.get(key);
                if (v === null) return def;
                const n = parseFloat(v);
                if (isNaN(n)) return def;
                return n * 1000;
            };
            DELAY_666_STAGE1 = getMs('d1', DEFAULT_DELAY_666_STAGE1);
            DELAY_666_STAGE2 = getMs('d2', DEFAULT_DELAY_666_STAGE2);
            const gapOrDefault = getMs('gap', DEFAULT_DELAY_666_STAGE3);
            DELAY_666_STAGE3 = getMs('d3', gapOrDefault);
            DOT_STAGE1_APPEAR = getMs('dot1On', DEFAULT_DOT_STAGE1_APPEAR);
            DOT_STAGE1_DISAPPEAR_BEFORE = getMs('dot1Off', DEFAULT_DOT_STAGE1_DISAPPEAR_BEFORE);
            DOT_STAGE2_APPEAR = getMs('dot2On', DEFAULT_DOT_STAGE2_APPEAR);
            DOT_STAGE2_DISAPPEAR_BEFORE = getMs('dot2Off', DEFAULT_DOT_STAGE2_DISAPPEAR_BEFORE);
            DOT_STAGE3_APPEAR = getMs('dot3On', DEFAULT_DOT_STAGE3_APPEAR);
            DOT_STAGE3_DISAPPEAR_BEFORE = getMs('dot3Off', DEFAULT_DOT_STAGE3_DISAPPEAR_BEFORE);
        } catch (e) {}
    }

    const displayElement = document.getElementById('display');
    const expressionDisplay = document.getElementById('expression');
    const settingsModal = document.getElementById('settingsModal');
    const forceNumberInput = document.getElementById('forceNumberInput');
    const modeIndicator = document.getElementById('modeIndicator');
    const clearButtonContent = document.getElementById('clearButtonContent');
    const pmContent = document.getElementById('pmContent');
    const pmOriginalHTML = pmContent.innerHTML;

    const dotTop = document.getElementById('dotTop');
    const dotMid = document.getElementById('dotMid');
    const dotBot = document.getElementById('dotBot');
    const clockHour = document.getElementById('clockHour');

    const calcIconButtons = document.querySelectorAll('.calc-icon-trigger');
    const equalsButtons = document.querySelectorAll('.equals-trigger');
    const delayDots = document.querySelectorAll('#calcIconButton .delay-dot');

    const BACKSPACE_SVG = `
        <svg viewBox="0 0 24 24" class="backspace-icon">
            <g transform="translate(-1.6 0)">
                <path d="M4 12 L9 5 H21 V19 H9 Z"
                      fill="none" stroke="currentColor"
                      stroke-width="1.8" stroke-linejoin="round"/>
                <path d="M12.3 10.3 L16.7 14.7 M16.7 10.3 L12.3 14.7"
                      stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </g>
        </svg>
    `;

    let delayTimers = [];

    function clearAllDelayTimers() {
        delayTimers.forEach(id => clearTimeout(id));
        delayTimers = [];
        hideDelayDot();
    }

    function showDelayDot() {
        delayDots.forEach(dot => dot.style.opacity = '1');
    }

    function hideDelayDot() {
        delayDots.forEach(dot => dot.style.opacity = '0');
    }

    function runDelayWithDot(totalMs, dotAppearOffsetMs, dotDisappearBeforeEndMs, onComplete) {
        clearAllDelayTimers();
        if (totalMs <= 0) { onComplete && onComplete(); return; }

        const appearTime = Math.max(0, dotAppearOffsetMs);
        const disappearTime = Math.max(0, totalMs - dotDisappearBeforeEndMs);

        const appearId = setTimeout(showDelayDot, appearTime);
        const disappearId = setTimeout(hideDelayDot, disappearTime);
        const completeId = setTimeout(() => {
            hideDelayDot();
            delayTimers = delayTimers.filter(id => id !== appearId && id !== disappearId && id !== completeId);
            onComplete && onComplete();
        }, totalMs);

        delayTimers.push(appearId, disappearId, completeId);
    }

    /* ====== 자동 카운트 ====== */
    async function requestMotionPermission() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            try {
                const permission = await DeviceMotionEvent.requestPermission();
                if (permission === 'granted') {
                    startOrientationDetection();
                } else {
                    alert('자동 카운트 기능을 사용하려면 모션 센서 권한이 필요합니다.');
                    autoCountMode = false;
                    updateAutoCountUI();
                }
            } catch (error) {
                alert('센서 권한 요청에 실패했습니다.');
                autoCountMode = false;
                updateAutoCountUI();
            }
        } else {
            startOrientationDetection();
        }
    }

    function startOrientationDetection() {
        window.addEventListener('deviceorientation', handleOrientation);
    }

    function stopOrientationDetection() {
        window.removeEventListener('deviceorientation', handleOrientation);
        stopCounting();
        if (countingStartDelay) {
            clearTimeout(countingStartDelay);
            countingStartDelay = null;
        }
    }

    function handleOrientation(event) {
        if (!autoCountMode) return;
        const beta = event.beta;
        const gamma = event.gamma;
        let newOrientation = 'unknown';

        if (Math.abs(beta) > 150) {
            newOrientation = 'down';
        } else if (Math.abs(beta) < 30 && Math.abs(gamma) < 30) {
            newOrientation = 'up';
        } else if (beta > 70 && beta < 110) {
            newOrientation = 'vertical';
        }

        if (newOrientation !== currentOrientation) {
            currentOrientation = newOrientation;
            handleOrientationChange(newOrientation);
        }
    }

    function handleOrientationChange(orientation) {
        switch(orientation) {
            case 'down':
                stopCounting();
                if (countingStartDelay) { clearTimeout(countingStartDelay); countingStartDelay = null; }
                resetAll();
                vibrateDevice();
                break;
            case 'vertical':
                if (!countingInterval && !countingStartDelay) {
                    vibrateDevice();
                    countingStartDelay = setTimeout(() => { startCounting(); countingStartDelay = null; }, 2000);
                }
                break;
            case 'up':
                if (countingStartDelay) { clearTimeout(countingStartDelay); countingStartDelay = null; }
                stopCounting();
                if (autoCountMode) {
                    autoCountMode = false;
                    stopOrientationDetection();
                    currentOrientation = 'unknown';
                    updateAutoCountUI();
                }
                vibrateDevice();
                break;
        }
    }

    function startCounting() {
        if (countingInterval) return;
        if (currentValue === '0' || currentValue === '') {
            currentValue = '1';
            fullExpression = '1';
            updateDisplay(currentValue);
        }
        countingInterval = setInterval(() => {
            let num = parseInt(currentValue);
            if (isNaN(num)) num = 0;
            num++;
            currentValue = num.toString();
            fullExpression = num.toString();
            updateDisplay(currentValue);
            updateClearButtonState();
        }, 1000);
        vibrateDevice();
    }

    function stopCounting() {
        if (countingInterval) {
            clearInterval(countingInterval);
            countingInterval = null;
            vibrateDevice();
        }
    }

    function toggleAutoCountMode() {
        autoCountMode = !autoCountMode;
        if (autoCountMode) {
            requestMotionPermission();
        } else {
            stopOrientationDetection();
            currentOrientation = 'unknown';
        }
        updateAutoCountUI();
        vibrateDevice();
    }

    function updateAutoCountUI() {
        document.body.classList.toggle('auto-count-mode', autoCountMode);
        updateModeIndicator();
    }

    /* ====== Clear 버튼 ====== */
    function updateClearButtonState() {
        const hasInput = (fullExpression !== '' || currentValue !== '0');
        if (!ios26Mode) {
            if (hasInput) {
                clearMode = 'backspace';
                clearButtonContent.innerHTML = BACKSPACE_SVG;
            } else {
                clearMode = 'all';
                clearButtonContent.textContent = 'AC';
            }
        } else {
            clearMode = 'all';
            clearButtonContent.innerHTML = BACKSPACE_SVG;
        }
    }

    function updateModeIndicator() {
        if (ios26Mode && clockHour) {
            let x2 = 5, y2 = 12;
            if (autoCountMode) { x2 = 6.5; y2 = 8.5; }
            else if (currentMode === 'force') { x2 = 7; y2 = 17; }
            else if (currentMode === '666') { x2 = 7; y2 = 7; }
            clockHour.setAttribute('x2', String(x2));
            clockHour.setAttribute('y2', String(y2));
            modeIndicator.textContent = '';
            return;
        }

        if (autoCountMode) {
            dotTop.style.opacity = '1';
            dotMid.style.opacity = '1';
            dotBot.style.opacity = '0';
        } else if (currentMode === 'force') {
            dotTop.style.opacity = '0';
            dotMid.style.opacity = '1';
            dotBot.style.opacity = '1';
        } else if (currentMode === '666') {
            dotTop.style.opacity = '1';
            dotMid.style.opacity = '0';
            dotBot.style.opacity = '1';
        } else {
            dotTop.style.opacity = '1';
            dotMid.style.opacity = '1';
            dotBot.style.opacity = '1';
        }
        modeIndicator.textContent = '';
    }

    function applyLayoutMode() {
        document.body.classList.toggle('ios26-theme', ios26Mode);
        if (ios26Mode) {
            pmContent.textContent = 'AC';
        } else {
            pmContent.innerHTML = pmOriginalHTML;
        }
        updateClearButtonState();
        updateModeIndicator();
    }

    /* ====== 탭 / 설정 ====== */
    calcIconButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            calcIconTapCount++;
            if (calcIconTapTimer) clearTimeout(calcIconTapTimer);
            calcIconTapTimer = setTimeout(() => { calcIconTapCount = 0; }, TAP_TIMEOUT);
            if (calcIconTapCount === 3) {
                calcIconTapCount = 0;
                clearTimeout(calcIconTapTimer);
                vibrateDevice();
                openSettings();
            }
        });

        btn.addEventListener('touchstart', () => {
            longPressTimer = setTimeout(() => { vibrateDevice(); openSettings(); }, LONG_PRESS_DURATION);
        });
        btn.addEventListener('touchend', () => clearTimeout(longPressTimer));
        btn.addEventListener('touchmove', () => clearTimeout(longPressTimer));
        btn.addEventListener('mousedown', () => {
            longPressTimer = setTimeout(() => { vibrateDevice(); openSettings(); }, LONG_PRESS_DURATION);
        });
        btn.addEventListener('mouseup', () => clearTimeout(longPressTimer));
        btn.addEventListener('mouseleave', () => clearTimeout(longPressTimer));
    });

    equalsButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            equalsTapCount++;
            if (equalsTapTimer) clearTimeout(equalsTapTimer);
            equalsTapTimer = setTimeout(() => { equalsTapCount = 0; }, TAP_TIMEOUT);
            if (equalsTapCount === 3) {
                equalsTapCount = 0;
                clearTimeout(equalsTapTimer);
                vibrateDevice();
                clearAllDelayTimers();
                specialSequenceActive = false;
                lastResultWas666 = false;
                sequenceStarted = false;
                currentMode = (currentMode === '666') ? 'normal' : '666';
                updateModeIndicator();
            }
        });
    });

    const percentButton = document.querySelector('.percent-button');
    percentButton.addEventListener('click', () => {
        percentTapCount++;
        if (percentTapTimer) clearTimeout(percentTapTimer);
        percentTapTimer = setTimeout(() => { percentTapCount = 0; }, TAP_TIMEOUT);
        if (percentTapCount === 3) {
            percentTapCount = 0;
            clearTimeout(percentTapTimer);
            toggleAutoCountMode();
            return;
        }
    });

    displayElement.addEventListener('click', () => {
        displayTapCount++;
        if (displayTapTimer) clearTimeout(displayTapTimer);
        displayTapTimer = setTimeout(() => { displayTapCount = 0; }, DISPLAY_TAP_TIMEOUT);
        if (displayTapCount === 3) {
            displayTapCount = 0;
            clearTimeout(displayTapTimer);
            ios26Mode = !ios26Mode;
            applyLayoutMode();
        }
    });

    forceNumberInput.addEventListener('input', (e) => {
        const value = e.target.value;
        forceNumber = value === '' ? null : parseFloat(value);
    });

    function openSettings() {
        settingsModal.classList.add('active');
        forceNumberInput.focus();
    }

    function closeSettings() {
        settingsModal.classList.remove('active');
        if (forceNumber !== null && !isNaN(forceNumber)) {
            currentMode = 'force';
            updateModeIndicator();
        }
    }

    function vibrateDevice() {
        if ('vibrate' in navigator) navigator.vibrate(50);
    }

    /* ====== 디스플레이 업데이트 ====== */
    function updateDisplay(value) {
        const containerWidth = displayElement.parentElement.offsetWidth - 48;
        let formattedValue = formatDisplayExpression(value);
        displayElement.textContent = formattedValue;

        const measureElement = document.createElement('span');
        measureElement.style.fontWeight = ios26Mode ? '500' : '400';
        measureElement.style.fontFamily = getComputedStyle(displayElement).fontFamily;
        measureElement.style.visibility = 'hidden';
        measureElement.style.position = 'absolute';
        measureElement.style.whiteSpace = 'nowrap';
        measureElement.textContent = formattedValue;
        document.body.appendChild(measureElement);

        // CSS 변수에서 기본 폰트 크기 읽기
        const baseFontSize = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--display-font-size')) || 80;
        let optimalFontSize = baseFontSize;
        measureElement.style.fontSize = optimalFontSize + 'px';
        const textWidth = measureElement.offsetWidth;

        if (textWidth > containerWidth) {
            optimalFontSize = Math.floor((containerWidth / textWidth) * optimalFontSize);
            optimalFontSize = Math.max(Math.floor(baseFontSize * 0.6), optimalFontSize);
        }

        document.body.removeChild(measureElement);
        displayElement.style.fontSize = optimalFontSize + 'px';

        setTimeout(() => {
            if (displayElement.scrollWidth > displayElement.clientWidth) {
                displayElement.scrollLeft = displayElement.scrollWidth - displayElement.clientWidth;
            }
        }, 0);
    }

    function updateExpression(text) {
        expressionDisplay.textContent = text;
    }

    /* ====== 입력 처리 ====== */
    function handleNumber(num) {
        vibrateDevice();
        if (autoCountMode) return;

        const lastChar = fullExpression.slice(-1);

        if (shouldResetDisplay) {
            if (fullExpression && '÷×−+'.includes(lastChar)) {
                currentValue = (num === '.' ? '0.' : num);
                fullExpression += (num === '.' ? '0.' : num);
            } else {
                currentValue = (num === '.' ? '0.' : num);
                fullExpression = (num === '.' ? '0.' : num);
            }
            shouldResetDisplay = false;
        } else {
            if (currentValue === '0' && num !== '.') {
                currentValue = num;
                if (fullExpression === '0' || fullExpression === '') {
                    fullExpression = num;
                } else {
                    fullExpression += num;
                }
            } else {
                if (num === '.' && currentValue.includes('.')) return;
                currentValue += num;
                fullExpression += num;
            }
        }

        updateDisplay(fullExpression || currentValue);

        if (currentMode === '666' && lastResultWas666 && !sequenceStarted) {
            const clean = fullExpression.replace(/,/g, '');
            if (clean === '666+666') {
                lastResultWas666 = false;
                sequenceStarted = true;
                specialSequenceActive = true;
                expressionDisplay.classList.remove('visible');
                updateExpression('');
                runDelayWithDot(DELAY_666_STAGE1, DOT_STAGE1_APPEAR, DOT_STAGE1_DISAPPEAR_BEFORE, () => {
                    if (!specialSequenceActive || currentMode !== '666') return;
                    fullExpression = '999+999';
                    currentValue = '999';
                    updateDisplay(fullExpression);
                    updateClearButtonState();
                });
            }
        }

        updateClearButtonState();
    }

    function handleOperator(op) {
        vibrateDevice();
        if (autoCountMode) return;

        if (shouldResetDisplay) {
            expressionDisplay.classList.remove('visible');
            updateExpression('');
            shouldResetDisplay = false;
        }

        if (fullExpression && '÷×−+'.includes(fullExpression.slice(-1))) {
            fullExpression = fullExpression.slice(0, -1) + op;
        } else {
            fullExpression = (fullExpression === '') ? currentValue + op : fullExpression + op;
        }

        currentValue = '0';
        updateDisplay(fullExpression);
        updateClearButtonState();
    }

    function handleFunction(func) {
        vibrateDevice();

        switch (func) {
            case '±':
                if (ios26Mode) { resetAll(); updateClearButtonState(); return; }
                if (autoCountMode) return;
                if (currentValue !== '0') {
                    const num = parseFloat(currentValue);
                    currentValue = (-num).toString();
                    const lastNumMatch = fullExpression.match(/[\d.]+$/);
                    if (lastNumMatch) {
                        fullExpression = fullExpression.slice(0, -lastNumMatch[0].length) + currentValue;
                    } else {
                        fullExpression = currentValue;
                    }
                    updateDisplay(fullExpression || currentValue);
                }
                break;

            case '%':
                if (autoCountMode) return;
                if (currentValue !== '0') {
                    const numP = parseFloat(currentValue) / 100;
                    currentValue = numP.toString();
                    const lastNumMatchP = fullExpression.match(/[\d.]+$/);
                    if (lastNumMatchP) {
                        fullExpression = fullExpression.slice(0, -lastNumMatchP[0].length) + currentValue;
                    } else {
                        fullExpression = currentValue;
                    }
                    updateDisplay(fullExpression || currentValue);
                }
                break;
        }

        updateClearButtonState();
    }

    function resetAll() {
        clearAllDelayTimers();
        specialSequenceActive = false;
        lastResultWas666 = false;
        sequenceStarted = false;
        stopCounting();
        if (countingStartDelay) { clearTimeout(countingStartDelay); countingStartDelay = null; }
        currentValue = '0';
        fullExpression = '';
        shouldResetDisplay = false;
        expressionDisplay.classList.remove('visible');
        updateExpression('');
        updateDisplay('0');
        clearMode = 'all';
    }

    function handleClear() {
        vibrateDevice();
        if (ios26Mode) { handleBackspace(); return; }

        if (clearMode === 'all') {
            resetAll();
        } else {
            if (fullExpression) {
                fullExpression = fullExpression.slice(0, -1);
                const lastNumMatch = fullExpression.match(/([\d.]+)$/);
                currentValue = lastNumMatch ? lastNumMatch[1] : '0';
            } else {
                if (currentValue.length > 1 && currentValue !== 'Error') {
                    currentValue = currentValue.slice(0, -1);
                } else {
                    currentValue = '0';
                }
            }
            if (fullExpression === '' && currentValue === '0') {
                expressionDisplay.classList.remove('visible');
                updateExpression('');
            }
            updateDisplay(fullExpression || currentValue);
        }
        updateClearButtonState();
    }

    function handleBackspace() {
        clearAllDelayTimers();
        specialSequenceActive = false;
        lastResultWas666 = false;
        sequenceStarted = false;

        if (fullExpression) {
            fullExpression = fullExpression.slice(0, -1);
            const lastNumMatch = fullExpression.match(/([\d.]+)$/);
            currentValue = lastNumMatch ? lastNumMatch[1] : '0';
        } else {
            if (currentValue.length > 1 && currentValue !== 'Error') {
                currentValue = currentValue.slice(0, -1);
            } else {
                currentValue = '0';
            }
        }
        if (fullExpression === '' && currentValue === '0') {
            expressionDisplay.classList.remove('visible');
            updateExpression('');
        }
        updateDisplay(fullExpression || currentValue);
        updateClearButtonState();
    }

    function handleCalcIcon() {
        if (ios26Mode) handleFunction('±');
    }

    function handleEquals() {
        vibrateDevice();
        if (autoCountMode) return;
        if (!fullExpression || fullExpression === '0') return;

        let result;
        const cleanExpr = fullExpression.replace(/,/g, '');

        if (currentMode === 'force' && forceNumber !== null) {
            const displayExpr = formatDisplayExpression(fullExpression);
            updateExpression(displayExpr + '=');
            expressionDisplay.classList.add('visible');
            result = forceNumber;
            currentMode = 'normal';
            clearAllDelayTimers();
            specialSequenceActive = false;
            lastResultWas666 = false;
            sequenceStarted = false;
            updateModeIndicator();
        }
        else if (currentMode === '666') {
            if (specialSequenceActive && cleanExpr === '999+999') {
                const displayExpr = formatDisplayExpression(fullExpression);
                updateExpression(displayExpr + '=');
                expressionDisplay.classList.add('visible');
                result = evaluateExpression(cleanExpr);

                runDelayWithDot(DELAY_666_STAGE2, DOT_STAGE2_APPEAR, DOT_STAGE2_DISAPPEAR_BEFORE, () => {
                    if (!specialSequenceActive || currentMode !== '666') return;
                    updateExpression('666+666=');
                    expressionDisplay.classList.add('visible');

                    runDelayWithDot(DELAY_666_STAGE3, DOT_STAGE3_APPEAR, DOT_STAGE3_DISAPPEAR_BEFORE, () => {
                        if (!specialSequenceActive || currentMode !== '666') return;
                        currentValue = '1332';
                        updateDisplay(formatNumber(1332));
                        specialSequenceActive = false;
                        lastResultWas666 = false;
                        sequenceStarted = false;
                        currentMode = 'normal';
                        updateModeIndicator();
                    });
                });
            } else {
                const displayExpr = formatDisplayExpression(fullExpression);
                updateExpression(displayExpr + '=');
                expressionDisplay.classList.add('visible');
                result = evaluateExpression(cleanExpr);
            }
        }
        else {
            const displayExpr = formatDisplayExpression(fullExpression);
            updateExpression(displayExpr + '=');
            expressionDisplay.classList.add('visible');
            try { result = evaluateExpression(cleanExpr); }
            catch (e) { result = 'Error'; }
        }

        if (result === 'Error' || isNaN(result) || !isFinite(result)) {
            currentValue = 'Error';
            updateDisplay('Error');
        } else {
            currentValue = result.toString();
            updateDisplay(formatNumber(result));
        }

        if (currentMode === '666' && Number(result) === 666) {
            lastResultWas666 = true;
            sequenceStarted = false;
        } else {
            lastResultWas666 = false;
            sequenceStarted = false;
        }

        fullExpression = '';
        shouldResetDisplay = true;

        if (!ios26Mode) {
            clearMode = 'all';
            clearButtonContent.textContent = 'AC';
        }
    }

    function evaluateExpression(expr) {
        expr = expr.replace(/\s/g, '').replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
        try { return Function('"use strict"; return (' + expr + ')')(); }
        catch (e) { return 'Error'; }
    }

    function formatNumber(num) {
        if (typeof num === 'string') num = parseFloat(num);
        if (isNaN(num)) return '0';
        if (Math.abs(num) >= 1e10 || (Math.abs(num) < 1e-6 && num !== 0)) {
            return num.toExponential(6).replace(/e\+?/, 'e');
        }
        let numStr = num.toString();
        if (numStr.includes('e')) return numStr;

        let parts = numStr.split('.');
        let integerPart = parts[0];
        let decimalPart = parts[1] || '';
        integerPart = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');

        if (decimalPart) {
            decimalPart = decimalPart.substring(0, 8).replace(/0+$/, '');
            if (decimalPart) return integerPart + '.' + decimalPart;
        }
        return integerPart;
    }

    function formatDisplayExpression(expr) {
        return expr.replace(/\d+\.?\d*/g, (match) => {
            let num = parseFloat(match);
            if (isNaN(num)) return match;
            let parts = match.split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return parts.join('.');
        });
    }

    settingsModal.addEventListener('click', (e) => {
        if (e.target === settingsModal) closeSettings();
    });

    // 초기화
    loadDelayConfigFromURL();
    updateDisplay(currentValue);
    updateClearButtonState();
    updateModeIndicator();
    applyLayoutMode();
</script>
</body>
</html>
